<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Garantia {{ garantia.garantia_number }} - Sistema IPPEL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', 'Liberation Sans', sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 30%, #dddddd 70%, #d0d0d0 100%);
            padding: 0;
            margin: 0;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #ffffff 0%, #fdfdfd 50%, #fafafa 100%);
            padding: 35px;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.18);
            border-radius: 0;
            overflow-y: auto;
            border-top: 8px solid #8b1538;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            position: relative;
        }

        .logos {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin: 0 auto;
        }

        .logo-ippel {
            width: 120px;
            height: 120px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .logo-ippel:hover {
            transform: scale(1.05);
        }

        .title-section {
            text-align: center;
            margin: 20px 0;
        }

        .main-title {
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #8b1538 0%, #6d1029 30%, #5a0d22 70%, #47091b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1.5px;
            position: relative;
            text-align: center;
        }

        .subtitle {
            font-size: 14px;
            color: #8b1538;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .form-section {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px;
            background: linear-gradient(145deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 15px;
            border: 1px solid #dee2e6;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #495057;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-label.required::after {
            content: " *";
            color: #dc3545;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ced4da;
            border-radius: 10px;
            background: white;
            font-size: 14px;
            font-weight: 500;
            color: #495057;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .form-control:focus {
            outline: none;
            border-color: #8b1538;
            box-shadow: 0 0 0 3px rgba(139, 21, 56, 0.15);
        }

        .form-control:hover {
            border-color: #adb5bd;
        }

        textarea.form-control {
            min-height: 100px;
            resize: vertical;
        }

        .form-row {
            display: flex;
            gap: 20px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .action-bar {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            height: 42px;
            padding: 0 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 6px rgba(0,0,0,.1);
            transition: all .2s ease;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,0,0,.15);
        }

        .save-btn {
            background: linear-gradient(135deg, #8b1538 0%, #6d1029 100%);
        }

        .save-btn:hover {
            background: linear-gradient(135deg, #6d1029 0%, #5a0d22 100%);
        }

        .cancel-btn {
            background: #6c757d;
        }

        .cancel-btn:hover {
            background: #5a6268;
        }

        .edit-mode-banner {
            background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
            color: white;
            padding: 12px 20px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(211, 84, 0, 0.3);
            font-size: 16px;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }

            .container {
                padding: 15px;
            }

            .form-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logos">
                <a href="/dashboard" class="logo-ippel">
                    <img src="/static/images/logo_ippel.png" alt="IPPEL" style="max-width: 100%; max-height: 100%;">
                </a>
            </div>
        </div>

        <div class="title-section">
            <h1 class="main-title">EDITAR GARANTIA</h1>
            <p class="subtitle">Garantia - n°{{ garantia.garantia_number|replace('GAR', '') }}</p>
        </div>

        <div class="edit-mode-banner">
            Editando Garantia - Apenas Administradores
        </div>

        <form method="POST" action="/edit_garantia/{{ garantia.id }}" class="form-section">
            <!-- Linha 1: CV | Data Emissão CV -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label required">CV</label>
                    <input type="text" name="cv" class="form-control" required placeholder="Número da CV" value="{{ garantia.cv or '' }}">
                </div>
                <div class="form-group">
                    <label class="form-label required">Data da Emissão da CV</label>
                    <input type="date" name="cv_date" class="form-control" required value="{{ garantia.cv_date or '' }}">
                </div>
            </div>

            <!-- Linha 2: Cliente | Equipamento -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label required">Cliente</label>
                    <select name="client" class="form-control" required>
                        <option value="">Selecione o cliente...</option>
                        {% for client in clients %}
                        <option value="{{ client[1] }}" {% if garantia.client == client[1] %}selected{% endif %}>{{ client[1] }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Equipamento</label>
                    <input type="text" name="equipment" class="form-control" placeholder="Nome do equipamento" value="{{ garantia.equipment or '' }}">
                </div>
            </div>

            <!-- Linha 3: Quantidade | Item a ser Fornecido -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Quantidade</label>
                    <input type="number" name="quantity" class="form-control" placeholder="Quantidade" min="0" step="1" value="{{ garantia.quantity or '' }}">
                </div>
                <div class="form-group">
                    <label class="form-label required">Item a ser Fornecido</label>
                    <input type="text" name="item_fornecido" class="form-control" required placeholder="Descrição do item a ser fornecido" value="{{ garantia.item_fornecido or '' }}">
                </div>
            </div>

            <!-- Linha 4: Setor Causador -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label required">Setor Causador</label>
                    <select id="setor_causador" name="setor_causador" class="form-control" required>
                        <option value="">Selecione o setor...</option>
                        {% for group in groups %}
                        <option value="{{ group[1] }}" data-id="{{ group[0] }}" {% if garantia.setor_causador == group[1] %}selected{% endif %}>{{ group[1] }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Linha 5: Prioridade | Área Responsável -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Prioridade</label>
                    <select name="priority" class="form-control">
                        <option value="Baixa" {% if garantia.priority == 'Baixa' %}selected{% endif %}>Baixa</option>
                        <option value="Média" {% if garantia.priority == 'Média' or not garantia.priority %}selected{% endif %}>Média</option>
                        <option value="Alta" {% if garantia.priority == 'Alta' %}selected{% endif %}>Alta</option>
                        <option value="Crítica" {% if garantia.priority == 'Crítica' %}selected{% endif %}>Crítica</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Área Responsável</label>
                    <select name="area_responsavel" class="form-control">
                        <option value="">Selecione...</option>
                        {% for area in areas %}
                        <option value="{{ area[0] }}" {% if garantia.area_responsavel|string == area[0]|string %}selected{% endif %}>{{ area[1] }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Status -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-control">
                        <option value="Pendente" {% if garantia.status == 'Pendente' or not garantia.status %}selected{% endif %}>Pendente</option>
                        <option value="Em Andamento" {% if garantia.status == 'Em Andamento' %}selected{% endif %}>Em Andamento</option>
                        <option value="Finalizada" {% if garantia.status == 'Finalizada' %}selected{% endif %}>Finalizada</option>
                        <option value="Cancelada" {% if garantia.status == 'Cancelada' %}selected{% endif %}>Cancelada</option>
                    </select>
                </div>
            </div>

            <!-- Descrição -->
            <div class="form-group">
                <label class="form-label">Descrição / Observações</label>
                <textarea name="description" class="form-control" placeholder="Descreva detalhes adicionais da garantia...">{{ garantia.description or '' }}</textarea>
            </div>

            <div class="action-bar">
                <button type="button" class="action-btn cancel-btn" onclick="window.location.href='/garantia/{{ garantia.id }}'">
                    Cancelar
                </button>
                <button type="submit" class="action-btn save-btn">
                    Salvar Alterações
                </button>
            </div>
        </form>
    </div>

    <script>
        // Garantia edit form - sem campo causador
    </script>
</body>
</html>
