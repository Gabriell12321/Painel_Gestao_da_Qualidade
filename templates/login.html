<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema IPPEL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #c41e3a;
            --primary-hover: #a8182f;
            --success: #2e7d32;
            --error: #c62828;
            --warning: #e65100;
            --text-dark: #1a1a1a;
            --text-body: #333;
            --text-secondary: #666;
            --text-muted: #888;
            --border: #ccc;
            --border-focus: #999;
            --bg-page: #f0f0f0;
            --bg-form: #fff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            display: flex;
            color: var(--text-body);
            -webkit-font-smoothing: antialiased;
        }

        /* ====== LADO ESQUERDO: imagem industrial ====== */
        .login-image-side {
            flex: 0 0 55%;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: stretch;
            background: #1f2a35;
        }

        .login-image-side img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: saturate(0.85) contrast(1.05);
        }

        /* Overlay sutil para escurecer bordas */
        .login-image-side::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(0,0,0,0.02) 0%, rgba(0,0,0,0.08) 100%);
            pointer-events: none;
        }

        /* Logo flutuante sobre a foto */
        .image-logo {
            position: absolute;
            top: 28px;
            left: 28px;
            z-index: 2;
            background: rgba(255,255,255,0.95);
            border-radius: 8px;
            padding: 12px 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .image-logo img {
            height: 42px;
            width: auto;
            display: block;
        }

        /* Faixa vermelha vertical (detalhe industrial) */
        .accent-bar {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            background: var(--primary);
            z-index: 2;
        }

        /* ====== LADO DIREITO: formulario ====== */
        .login-form-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 56px;
            background: var(--bg-form);
            min-height: 100vh;
            position: relative;
        }

        .form-wrapper {
            max-width: 400px;
            width: 100%;
        }

        /* Cabecalho do form */
        .form-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 40px;
        }

        .form-header-logo {
            width: 44px;
            height: 44px;
            object-fit: contain;
            border-radius: 4px;
        }

        .form-header-text {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-dark);
            line-height: 1.3;
        }

        /* Campos */
        .field-group {
            margin-bottom: 20px;
        }

        .field-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.01em;
        }

        .field-input-wrap {
            position: relative;
        }

        .field-input {
            width: 100%;
            padding: 12px 14px;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text-dark);
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 4px;
            outline: none;
            transition: border-color 0.2s;
        }

        .field-input::placeholder {
            color: #aaa;
        }

        .field-input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 2px rgba(0,0,0,0.04);
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px;
            display: flex;
            align-items: center;
        }

        .toggle-password:hover {
            color: var(--text-secondary);
        }

        /* Caps lock */
        .caps-indicator {
            display: none;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
            padding: 6px 10px;
            background: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: 3px;
            color: var(--warning);
            font-size: 0.78rem;
            font-weight: 500;
        }

        /* Esqueci senha */
        .form-extras {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 24px;
        }

        .forgot-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* Botao */
        .login-btn {
            width: auto;
            min-width: 140px;
            padding: 11px 32px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .login-btn:hover {
            background: var(--primary-hover);
        }

        .login-btn:active {
            background: #8b1528;
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-btn.loading .btn-text {
            opacity: 0;
        }

        .login-btn.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* Dica corporativa */
        .corp-hint {
            margin-top: 14px;
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        /* Mensagens */
        .message {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 4px;
            font-size: 0.82rem;
            font-weight: 500;
            margin-top: 18px;
        }

        .message.success {
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
            color: var(--success);
        }

        .message.error {
            background: #ffebee;
            border: 1px solid #ef9a9a;
            color: var(--error);
        }

        /* Rodape */
        .login-footer {
            position: absolute;
            bottom: 28px;
            left: 56px;
            right: 56px;
        }

        .footer-company {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 2px;
        }

        .footer-support {
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .footer-meta {
            display: flex;
            gap: 16px;
            margin-top: 6px;
        }

        .footer-meta span {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: 'Courier New', monospace;
            letter-spacing: 0.02em;
        }

        /* ====== Responsivo ====== */
        @media (max-width: 900px) {
            .login-image-side {
                display: none;
            }

            .login-form-side {
                padding: 40px 28px;
            }

            .login-footer {
                left: 28px;
                right: 28px;
            }
        }

        @media (max-width: 480px) {
            .login-form-side {
                padding: 32px 20px;
            }

            .login-footer {
                left: 20px;
                right: 20px;
                bottom: 16px;
            }

            .form-header-text {
                font-size: 1.1rem;
            }
        }

        @media (max-height: 650px) {
            .login-form-side {
                padding-top: 30px;
                padding-bottom: 80px;
            }

            .form-header {
                margin-bottom: 28px;
            }
        }
    </style>
</head>
<body>

    <!-- LADO ESQUERDO: foto industrial -->
    <div class="login-image-side">
        <div class="accent-bar"></div>
        <div class="image-logo">
            <img src="{{ url_for('static', filename='IPPELLOGO.jpg') }}" alt="IPPEL"
                 onerror="this.parentElement.style.display='none'">
        </div>
        <!-- Imagem industrial local -->
        <img src="{{ url_for('static', filename='imagemengenheiro.png') }}"
             alt="Operador em ambiente industrial">
    </div>

    <!-- LADO DIREITO: formulario -->
    <div class="login-form-side">
        <div class="form-wrapper">

            <!-- Cabecalho -->
            <div class="form-header">
                <img class="form-header-logo"
                     src="{{ url_for('static', filename='IPPELLOGO.jpg') }}"
                     alt="IPPEL"
                     onerror="this.style.display='none'">
                <span class="form-header-text">Painel IPPEL &ndash; Acesso ao Sistema</span>
            </div>

            <!-- Formulario -->
            <form id="loginForm" autocomplete="on">
                <div class="field-group">
                    <label for="email">Usu&aacute;rio ou Email</label>
                    <input type="email" id="email" name="email" class="field-input"
                           placeholder="Usu&aacute;rio ou Email" required autocomplete="email">
                </div>

                <div class="field-group">
                    <label for="password">Senha</label>
                    <div class="field-input-wrap">
                        <input type="password" id="password" name="password" class="field-input"
                               placeholder="Senha" required autocomplete="current-password"
                               style="padding-right: 42px;">
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar senha">
                            <svg id="eyeOpen" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg id="eyeClosed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                    <div id="capsIndicator" class="caps-indicator">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 17l10 5 10-5"/>
                            <path d="M2 12l10 5 10-5"/>
                        </svg>
                        Caps Lock ativado
                    </div>
                </div>

                <div class="form-extras">
                   
                </div>

                <button type="submit" class="login-btn" id="loginButton">
                    <span class="btn-text">Entrar</span>
                </button>

                <p class="corp-hint">Use seu usu&aacute;rio de rede corporativa.</p>
            </form>

            <!-- Mensagens -->
            <div id="message" class="message">
                <span class="msg-text"></span>
            </div>
        </div>

        <!-- Rodape institucional -->
        <footer class="login-footer">
            <div class="footer-company">IPPEL Equipamentos LTDA</div>
            <div class="footer-support">SUPORTE TI: informatica@ippel.com.br | RAMAL 8018</div>
            <div class="footer-meta">
                <span id="footerVersion">v3.4.2</span>
            </div>
        </footer>
    </div>

    <script>
        // Toggle senha
        document.getElementById('togglePassword').addEventListener('click', function() {
            var pwd = document.getElementById('password')
            var open = document.getElementById('eyeOpen')
            var closed = document.getElementById('eyeClosed')
            if (pwd.type === 'password') {
                pwd.type = 'text'
                open.style.display = 'none'
                closed.style.display = 'block'
            } else {
                pwd.type = 'password'
                open.style.display = 'block'
                closed.style.display = 'none'
            }
        })

        // Caps Lock
        var pwdEl = document.getElementById('password')
        var capsEl = document.getElementById('capsIndicator')
        pwdEl.addEventListener('keydown', function(e) {
            var on = e.getModifierState && e.getModifierState('CapsLock')
            capsEl.style.display = on ? 'flex' : 'none'
        })
        pwdEl.addEventListener('blur', function() { capsEl.style.display = 'none' })

        // Esqueci senha
        var forgotEl = document.getElementById('forgotLink')
        if (forgotEl) {
            forgotEl.addEventListener('click', function(e) {
                e.preventDefault()
                showMessage('Entre em contato com o administrador para redefinir sua senha.', 'error')
            })
        }

        // Mensagem
        function showMessage(text, type) {
            var el = document.getElementById('message')
            el.querySelector('.msg-text').textContent = text
            el.className = 'message ' + type
            el.style.display = 'flex'
            setTimeout(function() { el.style.display = 'none' }, 5000)
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault()

            var email = document.getElementById('email').value
            var password = document.getElementById('password').value
            var btn = document.getElementById('loginButton')

            if (!email || !password) {
                showMessage('Preencha todos os campos.', 'error')
                return
            }

            btn.disabled = true
            btn.classList.add('loading')

            try {
                var base = window.location.origin
                var resp = await fetch(base + '/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email: email, password: password })
                })
                var data = await resp.json()

                if (resp.ok) {
                    showMessage('Autenticado com sucesso.', 'success')
                    setTimeout(function() {
                        window.location.href = base + '/dashboard'
                    }, 800)
                } else {
                    throw new Error(data.error || 'Credenciais inv\u00e1lidas')
                }
            } catch (err) {
                showMessage(err.message || 'Erro de conex\u00e3o com o servidor.', 'error')
                btn.disabled = false
                btn.classList.remove('loading')
            }
        })

        // Foco inicial
        window.addEventListener('load', function() {
            setTimeout(function() { document.getElementById('email').focus() }, 200)
        })
    </script>
</body>
</html>
